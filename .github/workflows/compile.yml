name: Build Quickstart for HG680P

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache gettext libncurses5-dev libssl-dev zlib1g-dev gawk git gettext libelf-dev

      - name: Download OpenWrt SDK (24.10.5)
        run: |
          # Menggunakan URL versi stabil 24.10.5 untuk target armvirt/64
          BASE_URL="https://downloads.openwrt.org/releases/24.10.5/targets/armvirt/64"
          
          # Mengambil nama file otomatis dari server agar tidak error 404
          SDK_FILE=$(curl -s "$BASE_URL/sha256sums" | grep "openwrt-sdk" | awk '{print $2}' | sed 's/*//g')
          
          echo "Mendownload SDK: $SDK_FILE..."
          wget "$BASE_URL/$SDK_FILE"
          
          # Ekstrak dan ubah nama foldernya
          tar -xJf "$SDK_FILE"
          mv openwrt-sdk-* sdk

      - name: Update and Install Feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # Install dependency inti
          ./scripts/feeds install libubox libuci libubus

      - name: Clone Quickstart Source
        run: |
          cd sdk/package
          # Clone aplikasi utama dan interface LuCI-nya
          git clone https://github.com/linkease/quickstart.git
          git clone https://github.com/linkease/luci-app-quickstart.git

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          # Proses compile
          make package/quickstart/compile V=s
          make package/luci-app-quickstart/compile V=s

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-hg680p-aarch64
          path: sdk/bin/packages/aarch64_generic/base/*.ipk
