name: Get Quickstart IPK (iStoreOS Logic)

on:
  workflow_dispatch:

jobs:
  get-ipk:
    runs-on: ubuntu-latest
    steps:
      - name: Install Extract Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zstd tar

      - name: Download iStoreOS ImageBuilder (armsr/aarch64)
        run: |
          # URL server KoolCenter yang sama persis digunakan oleh repo Kwonelee
          BASE_URL="https://fw.koolcenter.com/iStoreOS/ib/armsr/"
          
          # Mencari nama file tar.zst / tar.xz terbaru secara dinamis dari server
          FILE_NAME=$(curl -s "$BASE_URL" | grep -oE '[a-zA-Z0-9._-]+\.tar\.(zst|xz)' | sort -V | tail -n 1)
          
          if [ -z "$FILE_NAME" ]; then
            echo "Error: Tidak dapat menemukan file ImageBuilder di server!"
            exit 1
          fi
          
          echo "Mendownload ImageBuilder: $FILE_NAME..."
          curl -O "$BASE_URL$FILE_NAME"
          
          echo "Mengekstrak ImageBuilder (ini mungkin memakan waktu puluhan detik)..."
          if [[ "$FILE_NAME" == *.zst ]]; then
            tar -I zstd -xf "$FILE_NAME"
          else
            tar -xf "$FILE_NAME"
          fi
          
          # Rename folder hasil ekstrak agar mudah diakses di langkah berikutnya
          mv *imagebuilder* ib_folder

      - name: Extract Quickstart IPK
        run: |
          mkdir -p output_ipk
          
          # Masuk ke folder packages milik iStoreOS dan "curi" file quickstart
          find ib_folder/packages/ -name "quickstart*.ipk" -exec cp {} output_ipk/ \;
          find ib_folder/packages/ -name "luci-app-quickstart*.ipk" -exec cp {} output_ipk/ \;
          
          echo "File IPK yang berhasil didapatkan:"
          ls -lh output_ipk/

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ipk-istoreos-24.10
          path: output_ipk/*.ipk
