name: Build Quickstart IPK Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache gettext libncurses5-dev libssl-dev zlib1g-dev gawk git gettext libelf-dev

      - name: Download OpenWrt SDK
        run: |
          # Menggunakan SDK OpenWrt 23.05.5 (Basis sistem dari iStoreOS)
          # SDK ini akan menghasilkan file .ipk aarch64_generic yang Anda butuhkan
          wget https://downloads.openwrt.org/releases/23.05.5/targets/armvirt/64/openwrt-sdk-23.05.5-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Update and Install Feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clone Quickstart Source
        run: |
          cd sdk/package
          # Clone aplikasi utama dan interface web LuCI-nya
          git clone https://github.com/linkease/quickstart.git
          git clone https://github.com/linkease/luci-app-quickstart.git

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          # Proses compile menjadi .ipk
          make package/quickstart/compile V=s
          make package/luci-app-quickstart/compile V=s

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ipk-aarch64-generic
          # Mengambil hasil .ipk dan mengunggahnya ke GitHub
          path: sdk/bin/packages/**/base/*.ipk
