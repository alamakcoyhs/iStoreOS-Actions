name: Get Quickstart IPK (iStoreOS Logic)

on:
  workflow_dispatch:

jobs:
  get-ipk:
    runs-on: ubuntu-latest
    steps:
      - name: Install Extract Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zstd tar

      - name: Download & Extract iStoreOS ImageBuilder
        run: |
          # URL server KoolCenter 
          BASE_URL="https://fw.koolcenter.com/iStoreOS/ib/armsr/"
          
          # Mencari nama file terbaru
          FILE_NAME=$(curl -s "$BASE_URL" | grep -oE '[a-zA-Z0-9._-]+\.tar\.(zst|xz)' | sort -V | tail -n 1)
          
          if [ -z "$FILE_NAME" ]; then
            echo "Error: Tidak dapat menemukan file ImageBuilder di server!"
            exit 1
          fi
          
          echo "Mendownload ImageBuilder: $FILE_NAME..."
          curl -O "$BASE_URL$FILE_NAME"
          
          echo "Mengekstrak file (langsung dituangkan ke dalam ib_folder)..."
          mkdir -p ib_folder
          
          # Ekstrak langsung ke ib_folder dan buang struktur folder utama bawaannya (--strip-components=1)
          if [[ "$FILE_NAME" == *.zst ]]; then
            tar -I zstd -xf "$FILE_NAME" -C ib_folder --strip-components=1
          else
            tar -xf "$FILE_NAME" -C ib_folder --strip-components=1
          fi

      - name: Extract Quickstart IPK
        run: |
          mkdir -p output_ipk
          
          # Curi file ipk yang dibutuhkan
          find ib_folder/packages/ -name "quickstart*.ipk" -exec cp {} output_ipk/ \;
          find ib_folder/packages/ -name "luci-app-quickstart*.ipk" -exec cp {} output_ipk/ \;
          
          echo "Daftar file yang berhasil didapatkan:"
          ls -lh output_ipk/

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ipk-istoreos-24.10
          path: output_ipk/*.ipk
