name: Build Quickstart for HG680P

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache gettext libncurses5-dev libssl-dev zlib1g-dev gawk git gettext libelf-dev

      - name: Download OpenWrt SDK (aarch64_generic)
        run: |
          # Menggunakan SDK untuk target armvirt/64 (aarch64_generic)
          wget https://downloads.openwrt.org/snapshots/targets/armvirt/64/openwrt-sdk-armvirt-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Update and Install Feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clone Quickstart Source
        run: |
          cd sdk/package
          # Clone aplikasi utama dan interface LuCI-nya
          git clone https://github.com/linkease/quickstart.git
          git clone https://github.com/linkease/luci-app-quickstart.git

      - name: Compile Package
        run: |
          cd sdk
          # Membuat file .config default agar SDK mengenali paket baru
          make defconfig
          # Compile paket (V=s untuk log lengkap jika error)
          make package/quickstart/compile V=s
          make package/luci-app-quickstart/compile V=s

      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: quickstart-hg680p-aarch64
          path: sdk/bin/packages/aarch64_generic/base/*.ipk
